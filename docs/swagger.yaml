definitions:
  domain.AccountType:
    enum:
    - savings
    - checking
    type: string
    x-enum-varnames:
    - Savings
    - Checking
  domain.Role:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
  domain.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  domain.TransactionType:
    enum:
    - transfer
    - deposit
    - withdrawal
    type: string
    x-enum-varnames:
    - Transfer
    - Deposit
    - Withdrawal
  domain.User:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      password:
        type: string
      refresh_token:
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    type: object
  web.AccountCreateRequest:
    properties:
      account_bank:
        maxLength: 100
        minLength: 1
        type: string
      account_type:
        $ref: '#/definitions/domain.AccountType'
      balance:
        type: number
      user_id:
        maximum: 100
        minimum: 1
        type: integer
    required:
    - account_bank
    - balance
    - user_id
    type: object
  web.AccountResponse:
    properties:
      account_bank:
        type: string
      account_type:
        type: string
      balance:
        type: number
      id:
        type: integer
      user_id:
        type: integer
    type: object
  web.AccountUpdateRequest:
    properties:
      account_bank:
        maxLength: 100
        minLength: 1
        type: string
      account_type:
        $ref: '#/definitions/domain.AccountType'
      balance:
        type: number
    required:
    - account_bank
    - balance
    type: object
  web.TransactionCreateRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      from_account_id:
        maximum: 100
        minimum: 1
        type: integer
      to_account_id:
        maximum: 100
        minimum: 1
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
    required:
    - amount
    - from_account_id
    - to_account_id
    type: object
  web.TransactionDepositRequest:
    properties:
      account_id:
        minimum: 1
        type: integer
      amount:
        type: number
      description:
        type: string
    required:
    - account_id
    - amount
    type: object
  web.TransactionResponse:
    properties:
      amount:
        type: number
      description:
        type: string
      from_account_id:
        type: integer
      id:
        type: integer
      to_account_id:
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
    type: object
  web.TransactionTransferRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      from_account_id:
        minimum: 1
        type: integer
      to_account_id:
        minimum: 1
        type: integer
    required:
    - amount
    - from_account_id
    - to_account_id
    type: object
  web.TransactionUpdateRequest:
    properties:
      amount:
        type: number
      description:
        type: string
      from_account_id:
        maximum: 100
        minimum: 1
        type: integer
      to_account_id:
        maximum: 100
        minimum: 1
        type: integer
      type:
        $ref: '#/definitions/domain.TransactionType'
    required:
    - amount
    - from_account_id
    - to_account_id
    type: object
  web.TransactionWithdrawRequest:
    properties:
      account_id:
        minimum: 1
        type: integer
      amount:
        type: number
      description:
        type: string
    required:
    - account_id
    - amount
    type: object
  web.UserCreateRequest:
    properties:
      email:
        maxLength: 100
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    required:
    - email
    - name
    - password
    type: object
  web.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  web.UserUpdateMeRequest:
    properties:
      email:
        maxLength: 100
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  web.UserUpdateRequest:
    properties:
      email:
        maxLength: 100
        minLength: 1
        type: string
      id:
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    required:
    - email
    - id
    - name
    - password
    type: object
info:
  contact: {}
paths:
  /api/admin/accounts:
    get:
      consumes:
      - application/json
      description: Get all accounts
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.AccountResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Create a new account
      parameters:
      - description: Account creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AccountCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Create account
      tags:
      - Accounts
  /api/admin/accounts/{accountId}:
    delete:
      consumes:
      - application/json
      description: Delete account by ID
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - Accounts
    get:
      consumes:
      - application/json
      description: Get account details by ID (admin only)
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Get account by ID
      tags:
      - Accounts
    put:
      consumes:
      - application/json
      description: Update account by ID
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      - description: Account update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AccountUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Update account
      tags:
      - Accounts
  /api/admin/transactions:
