definitions:
  domain.AccountType:
    enum:
    - savings
    - checking
    type: string
    x-enum-varnames:
    - Savings
    - Checking
  domain.Role:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - RoleAdmin
    - RoleUser
  domain.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  domain.User:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      password:
        type: string
      refresh_token:
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    type: object
  web.AccountCreateRequest:
    properties:
      account_bank:
        maxLength: 100
        minLength: 1
        type: string
      account_type:
        $ref: '#/definitions/domain.AccountType'
      balance:
        minimum: 1
        type: number
      user_id:
        maximum: 100
        minimum: 1
        type: integer
    required:
    - account_bank
    - account_type
    - balance
    - user_id
    type: object
  web.AccountResponse:
    properties:
      account_bank:
        type: string
      account_type:
        type: string
      balance:
        type: number
      id:
        type: integer
      user_id:
        type: integer
    type: object
  web.AccountUpdateRequest:
    properties:
      account_bank:
        maxLength: 100
        minLength: 1
        type: string
      account_type:
        $ref: '#/definitions/domain.AccountType'
      balance:
        minimum: 1
        type: number
    required:
    - account_bank
    - account_type
    - balance
    type: object
  web.UserCreateRequest:
    properties:
      email:
        maxLength: 100
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    required:
    - email
    - name
    - password
    type: object
  web.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      password:
        type: string
      refresh_token:
        type: string
      role:
        type: string
    type: object
  web.UserUpdateMeRequest:
    properties:
      email:
        maxLength: 100
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  web.UserUpdateRequest:
    properties:
      email:
        maxLength: 100
        minLength: 1
        type: string
      id:
        type: integer
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 100
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/domain.Role'
    required:
    - email
    - id
    - name
    - password
    type: object
info:
  contact: {}
paths:
  /api/admin/accounts:
    get:
      consumes:
      - application/json
      description: Get all accounts
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.AccountResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List accounts
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Create a new account
      parameters:
      - description: Account creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AccountCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Create account
      tags:
      - Accounts
  /api/admin/accounts/{accountId}:
    delete:
      consumes:
      - application/json
      description: Delete account by ID
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - Accounts
    get:
      consumes:
      - application/json
      description: Get account details by ID (admin only)
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Get account by ID
      tags:
      - Accounts
    put:
      consumes:
      - application/json
      description: Update account by ID
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      - description: Account update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AccountUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Update account
      tags:
      - Accounts
  /api/admin/users:
    get:
      consumes:
      - application/json
      description: Get all users (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.UserResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Create a new user (admin only)
      parameters:
      - description: User creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - Users
  /api/admin/users/{userId}:
    delete:
      consumes:
      - application/json
      description: Delete user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Get user details by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: User update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - Users
  /api/user/accounts:
    get:
      consumes:
      - application/json
      description: Get accounts belonging to the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.AccountResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get my accounts
      tags:
      - Accounts
  /api/user/accounts/{accountId}:
    get:
      consumes:
      - application/json
      description: Get account details by ID for the authenticated user
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Get my account by ID
      tags:
      - Accounts
  /api/user/profile:
    get:
      consumes:
      - application/json
      description: Get authenticated user profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update authenticated user profile
      parameters:
      - description: User update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.UserUpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - Users
  /login:
    post:
      consumes:
      - application/json
      description: Login user and return access and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.TokenResponse'
      summary: Login
      tags:
      - Auth
  /logout:
    post:
      consumes:
      - application/json
      description: Logout user by invalidating refresh token
      parameters:
      - description: Logout request
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - text/plain
      responses:
        "200":
          description: OK
      summary: Logout
      tags:
      - Auth
  /refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh token
      tags:
      - Auth
  /register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: User registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - text/plain
      responses:
        "201":
          description: Created
      summary: Register user
      tags:
      - Auth
swagger: "2.0"
