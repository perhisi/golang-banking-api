      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.TransactionResponse'
      security:
      - BearerAuth: []
      summary: Get transaction by ID
      tags:
      - Transactions
    put:
      consumes:
      - application/json
      description: Update transaction by ID
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: integer
      - description: Transaction update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.TransactionUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.TransactionResponse'
      security:
      - BearerAuth: []
      summary: Update transaction
      tags:
      - Transactions
  /api/admin/users:
    get:
      consumes:
      - application/json
      description: Get all users (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.UserResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Create a new user (admin only)
      parameters:
      - description: User creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.UserCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - Users
  /api/admin/users/{userId}:
    delete:
      consumes:
      - application/json
      description: Delete user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Get user details by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      - description: User update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Update user
      tags:
      - Users
  /api/user/accounts:
    get:
      consumes:
      - application/json
      description: Get accounts belonging to the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.AccountResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get my accounts
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Create a new account for the authenticated user
      parameters:
      - description: Account creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AccountCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Create my account
      tags:
      - Accounts
  /api/user/accounts/{accountId}:
    delete:
      consumes:
      - application/json
      description: Delete an account belonging to the authenticated user
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
      security:
      - BearerAuth: []
      summary: Delete my account
      tags:
      - Accounts
    get:
      consumes:
      - application/json
      description: Get account details by ID for the authenticated user
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Get my account by ID
      tags:
      - Accounts
    patch:
      consumes:
      - application/json
      description: Update an account belonging to the authenticated user
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      - description: Account update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.AccountUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.AccountResponse'
      security:
      - BearerAuth: []
      summary: Update my account
      tags:
      - Accounts
  /api/user/profile:
    get:
      consumes:
      - application/json
      description: Get authenticated user profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update authenticated user profile
      parameters:
      - description: User update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.UserUpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.UserResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - Users
  /api/user/transactions:
    get:
      consumes:
      - application/json
      description: List all transactions across the authenticated user's accounts
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.TransactionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List my transactions
      tags:
      - Transactions
  /api/user/transactions/{accountId}:
    get:
      consumes:
      - application/json
      description: Get transactions for a specific account belonging to the authenticated
        user
      parameters:
      - description: Account ID
        in: path
        name: accountId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/web.TransactionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get my transactions by account ID
      tags:
      - Transactions
  /api/user/transactions/{transactionId}:
    get:
      consumes:
      - application/json
      description: Get transaction details by ID for the authenticated user
      parameters:
      - description: Transaction ID
        in: path
        name: transactionId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.TransactionResponse'
      security:
      - BearerAuth: []
      summary: Get my transaction by ID
      tags:
      - Transactions
  /api/user/transactions/deposit:
    post:
      consumes:
      - application/json
      description: Deposit an amount into an account
      parameters:
      - description: Deposit request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.TransactionDepositRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.TransactionResponse'
      security:
      - BearerAuth: []
      summary: Deposit
      tags:
      - Transactions
  /api/user/transactions/transfer:
    post:
      consumes:
      - application/json
      description: Transfer an amount between accounts
      parameters:
      - description: Transfer request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.TransactionTransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.TransactionResponse'
      security:
      - BearerAuth: []
      summary: Transfer
      tags:
      - Transactions
  /api/user/transactions/withdraw:
    post:
      consumes:
      - application/json
      description: Withdraw an amount from an account
      parameters:
      - description: Withdraw request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/web.TransactionWithdrawRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/web.TransactionResponse'
      security:
      - BearerAuth: []
      summary: Withdraw
      tags:
      - Transactions
  /login:
    post:
      consumes:
      - application/json
      description: Login user and return access and refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.TokenResponse'
      summary: Login
      tags:
      - Auth
  /logout:
    post:
      consumes:
      - application/json
      description: Logout user by invalidating refresh token
      parameters:
      - description: Logout request
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - text/plain
      responses:
        "200":
          description: OK
      summary: Logout
      tags:
      - Auth
  /refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh token
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Refresh token
      tags:
      - Auth
  /register:
    post:
      consumes:
      - application/json
      description: Register a new user account
      parameters:
      - description: User registration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.User'
      produces:
      - text/plain
      responses:
        "201":
          description: Created
      summary: Register user
      tags:
      - Auth
swagger: "2.0"
